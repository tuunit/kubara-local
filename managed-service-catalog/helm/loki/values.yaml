---
alloy:
  alloy:
    configMap:
      content: |-
        discovery.kubernetes "pod" {
          role = "pod"
        }
        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pod.targets
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            action = "replace"
            target_label = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            action = "replace"
            target_label = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            action = "replace"
            target_label = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            action = "replace"
            target_label = "app"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
            action = "replace"
            target_label = "job"
            separator = "/"
            replacement = "$1"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
            action = "replace"
            target_label = "__path__"
            separator = "/"
            replacement = "/var/log/pods/*$1/*.log"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_id"]
            action = "replace"
            target_label = "container_runtime"
            regex = "^(\\S+):\\/\\/.+$"
            replacement = "$1"
          }
        }
        loki.source.kubernetes "pod_logs" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.write.default.receiver]
        }
        loki.write "default" {
          endpoint {
            url = "http://loki:3100/loki/api/v1/push"
          }
        }
    mounts:
      varlog: true
      extra:
        - name: tmp
          mountPath: /tmp
    resources:
      requests:
        cpu: 100m
        memory: 300Mi
      limits:
        memory: 300Mi
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  controller:
    type: daemonset
    volumes:
      extra:
        - name: tmp
          emptyDir: {}
  configReloader:
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 100Mi
    securityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
loki:
  # the loki.storage.bucketNames.chunks value is only added because of a templating bug in loki; actual value should be set as loki.loki.storage.bucketNames.chunks
  monitoring:
    serviceMonitor:
      enabled: false
  test:
    enabled: false
  gateway:
    enabled: false  # for the canary
  ingress:
    enabled: false
  read:
    extraArgs:
      - '-config.expand-env=true'
    extraEnv:
      - name: S3_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: secret-key-storage
      - name: S3_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: access-key-id-storage
  write:
    extraArgs:
      - '-config.expand-env=true'
    extraEnv:
      - name: S3_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: secret-key-storage
      - name: S3_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: access-key-id-storage
  backend:
    extraArgs:
      - '-config.expand-env=true'
    extraEnv:
      - name: S3_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: secret-key-storage
      - name: S3_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: access-key-id-storage
  global:
    dnsService: kube-dns
  deploymentMode: SimpleScalable
  loki:
    podSecurityContext:
      fsGroup: 10001
      runAsGroup: 10001
      runAsNonRoot: true
      runAsUser: 10001
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      privileged: false
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    useTestSchema: true
    analytics:
      reporting_enabled: false
    storage:
      type: s3
      s3:
        s3: s3://  # Important to make s3-compatible storage like STACKIT work
        region: eu01
        accessKeyId: ${S3_ACCESS_KEY_ID}
        secretAccessKey: ${S3_SECRET_KEY}
        s3ForcePathStyle: true
        http_config:
          insecure_skip_verify: true
    storage_config:
      boltdb_shipper:
        active_index_directory: /var/loki/boltdb-shipper-active
        cache_location: /var/loki/boltdb-shipper-cache
      tsdb_shipper:
        active_index_directory: /var/loki/tsdb-index
        cache_location: /var/loki/tsdb-cache
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  singleBinary:
    resources:
      requests:
        cpu: 50m
        memory: 500Mi
      limits:
        memory: 500Mi
  lokiCanary:
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 100Mi
  sidecar:
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 100Mi
namespace: {}
