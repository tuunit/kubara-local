{{- with .Values.traefikPathRewrite }}
{{- if .enabled }}
{{- $prefix := .pathPrefix | default "/longhorn" }}
# Longhorn UI uses root-relative assets; when exposed below a path prefix,
# Traefik has to normalize the URL before forwarding to longhorn-frontend.
# See https://github.com/longhorn/longhorn/issues/1745 for the upstream context.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-noslash
  namespace: {{ $.Release.Namespace }}
spec:
  redirectRegex:
    permanent: true
    regex: "^(https?://[^/]+{{ $prefix }})$"
    replacement: "${1}/"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-prefix
  namespace: {{ $.Release.Namespace }}
spec:
  replacePathRegex:
    regex: "^{{ $prefix }}/(.*)"
    replacement: "/${1}"
{{- end }}
{{- end }}
