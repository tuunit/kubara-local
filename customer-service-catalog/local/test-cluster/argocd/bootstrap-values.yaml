        - "https://github.com/tuunit/kubara-local.git"
        - "https://charts.external-secrets.io/"
        - "https://charts.jetstack.io"
        - "https://oauth2-proxy.github.io/manifests"
        - "https://prometheus-community.github.io/helm-charts"
        - "ghcr.io/traefik/helm"
        - "oci://ghcr.io/traefik/helm"
argo-cd:
  server:
    ingressGrpc:
      enabled: false
      annotations:
        cert-manager.io/cluster-issuer: ""
      tls: false
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: ""
      tls: false
  configs:
    cm:
      url: http://172.18.0.2.traefik.me/argocd
      dex.config: |
        connectors:
          - type: oidc
            id: openbao
            name: OpenBao
            config:
              issuer: http://openbao.172.18.0.2.traefik.me/v1/identity/oidc/provider/default
              clientID: YHXEtsqBxQnEQvkK3OASxvrafvv39ZvH
              clientSecret: hvo_secret_pRNMr6bwrYaJ8xjLgFC3AtI4tkeqWC9JUqIKJkZpOb3rQ4KnLXYH0TGeRpqYMTfw
              redirectURI: http://172.18.0.2.traefik.me/argocd/api/dex/callback
              scopes:
                - openid
              insecureSkipEmailVerified: true
              userIDKey: sub
              userNameKey: sub
    rbac:
      policy.default: role:admin
      policy.csv: ""
