namespace:
  labels:
    project-name: "test-cluster"
    stage: "dev"


externalSecrets:
  secretStoreRef:
    kind: ClusterSecretStore
    name: test-cluster-dev

  secretStores:
    test-cluster-dev:
      kind: ClusterSecretStore
      name: test-cluster-dev

  secrets:
    oauth2-credentials:
      secretStoreRef: test-cluster-dev
      dataFrom:
        - remoteKey: oauth2_credentials


oauth2-proxy:
  imagePullSecrets:
    - name: image-pull-secret
  config:
    existingSecret: oauth2-credentials
    configFile: |-
      reverse_proxy = true
      redirect_url = "https://172.18.0.2.traefik.me/oauth2/callback"
      email_domains = [ "*" ]
      cookie_secure = true
      upstreams = [ "static://200" ]
      github_org = "local"
      github_team = "local"
      provider = "github"
      scope = "read:user user:email read:org"
  ingress:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-staging
    enabled: true
    path: /oauth2
    pathType: Prefix
    hosts:
      - 172.18.0.2.traefik.me
    tls:
      - secretName: tls-oauth2-proxy
        hosts:
          - 172.18.0.2.traefik.me
  metrics:
    serviceMonitor:
      enabled: true
      labels:
        monitoring.instance: "test-cluster-dev"


middleware:
  name: oauth-auth
  namespace: oauth2-proxy

  forwardAuth:
    address: http://oauth2-proxy.oauth2-proxy.svc.cluster.local/oauth2/
    trustForwardHeader: true

    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - Authorization
