namespace:
  labels:
    project-name: "test-cluster"
    stage: "local"
policy-reporter:
  imagePullSecrets:
    - name: image-pull-secret
  replicaCount: 1
  metrics:
    enabled: true
  monitoring:
    serviceMonitor:
      labels:
        monitoring.instance: "test-cluster-local"
  ui:
    enabled: true
    ingress:
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
      hosts:
        - host: 192.168.97.3.traefik.me
          paths:
            - path: "/kyverno"
              pathType: Prefix
      tls:
        - secretName: tls-kyverno-ui
          hosts:
            - 192.168.97.3.traefik.me

