kube-prometheus-stack:
  global:
    imagePullSecrets:
      - name: image-pull-secret
    imageRegistry: ""
  prometheusOperator:
    serviceMonitor:
      additionalLabels:
        monitoring.instance: test-cluster-local
    prometheus:
      monitor:
        additionalLabels:
          monitoring.instance: test-cluster-local
  prometheus:
    serviceMonitor:
      additionalLabels:
        monitoring.instance: test-cluster-local
    ingress:
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
      paths:
        - /prometheus
      pathType: ImplementationSpecific
      hosts:
        - 192.168.97.3.traefik.me
      tls:
        - secretName: tls-prometheus
          hosts:
            - 192.168.97.3.traefik.me


    prometheusSpec:
      retention: 10d
      serviceMonitorSelector:
        matchLabels:
          monitoring.instance: test-cluster-local
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
      externalUrl: https://192.168.97.3.traefik.me/prometheus
      routePrefix: /prometheus
    thanosServiceMonitor:
      serviceMonitor:
        additionalLabels:
          monitoring.instance: test-cluster-local
  alertmanager:
    serviceMonitor:
      additionalLabels:
        monitoring.instance: test-cluster-local
    ingress:
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
      paths:
        - /alertmanager
      pathType: ImplementationSpecific
      hosts:
        - 192.168.97.3.traefik.me
      tls:
        - secretName: tls-alertmanager
          hosts:
            - 192.168.97.3.traefik.me


# Below is an example alertmanager.config section:
