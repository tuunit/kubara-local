kube-prometheus-stack:
  global:
    imagePullSecrets:
      - name: image-pull-secret
    imageRegistry: ""
  prometheusOperator:
    serviceMonitor:
      additionalLabels:
        monitoring.instance: test-cluster-dev
    prometheus:
      monitor:
        additionalLabels:
          monitoring.instance: test-cluster-dev
  prometheus:
    serviceMonitor:
      additionalLabels:
        monitoring.instance: test-cluster-dev
    ingress:
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
        traefik.ingress.kubernetes.io/router.middlewares: oauth2-proxy-oauth-auth@kubernetescrd
      enabled: true
      paths:
        - /prometheus
      pathType: ImplementationSpecific
      hosts:
        - 172.18.0.3.traefik.me
      tls:
        - secretName: tls-prometheus
          hosts:
            - 172.18.0.3.traefik.me


    prometheusSpec:
      retention: 10d
      serviceMonitorSelector:
        matchLabels:
          monitoring.instance: test-cluster-dev
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
      externalUrl: https://172.18.0.3.traefik.me/prometheus
      routePrefix: /prometheus
    thanosServiceMonitor:
      serviceMonitor:
        additionalLabels:
          monitoring.instance: test-cluster-dev
  alertmanager:
    serviceMonitor:
      additionalLabels:
        monitoring.instance: test-cluster-dev
    ingress:
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
        traefik.ingress.kubernetes.io/router.middlewares: oauth2-proxy-oauth-auth@kubernetescrd
      enabled: true
      paths:
        - /alertmanager
      pathType: ImplementationSpecific
      hosts:
        - 172.18.0.3.traefik.me
      tls:
        - secretName: tls-alertmanager
          hosts:
            - 172.18.0.3.traefik.me


# Below is an example alertmanager.config section:
