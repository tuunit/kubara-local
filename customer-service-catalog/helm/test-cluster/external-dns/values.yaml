

namespace:
  labels:
    project-name: "test-cluster"
    stage: "local"
external-dns:
  txtOwnerId: test-cluster-local
  domainFilters:
    - 192.168.97.3.traefik.me
  extraArgs:
    source:
      - traefik-proxy
    webhook-provider-url: http://localhost:8080
  rbac:
    create: true
    additionalPermissions:
      - apiGroups: ["traefik.io"]
        resources:
          - ingressroutes
          - ingressroutetcps
          - ingressrouteudps
          - tlsoptions
          - tlsstores
        verbs: ["get", "watch", "list"]
      - apiGroups: [""]
        resources:
          - "namespaces"
        verbs: ["get", "watch", "list"]
  global:
    imagePullSecrets:
      - name: image-pull-secret
    security:
      allowInsecureImages: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      monitoring.instance: "test-cluster-local"
