bootstrapValues:
  dockerPullSecrets:
    image-pull-secret:
      name: image-pull-secret
      matchNamespaceLabels:
        project-name: "test-cluster"
        stage: "local"
      secretStoreRef:
        kind: ClusterSecretStore
        name: "test-cluster-local"
      remoteRef:
        remoteKey: docker_config
        remoteKeyProperty: pull-secret
  projects:
    test-cluster-local:
      name: "test-cluster-local"
      namespace: argocd
      description: "test-cluster-local project"
      orphanedResources:
        warn: false
        ignore:
          - kind: Secret
            name: cert-manager-webhook-ca

  applicationSets:
    test-cluster-local:
      projectName: "test-cluster-local"
      managedServices:
        repoURL: "https://github.com/tuunit/kubara-local.git"
        path: "managed-service-catalog/helm"
        targetRevision: "main"
      customerServices:
        repoURL: "https://github.com/tuunit/kubara-local.git"
        path: "customer-service-catalog/helm"
        targetRevision: "main"
      apps:
        argocd:
          name: argocd
          path: argo-cd
        cert-manager:
          name: cert-manager
          path: cert-manager
        external-dns:
          name: external-dns
          path: external-dns
        external-secrets:
          name: external-secrets
          path: external-secrets
        homer-dashboard:
          name: homer-dashboard
          path: homer-dashboard
        kube-prometheus-stack:
          name: kube-prometheus-stack
          path: kube-prometheus-stack
        kyverno:
          name: kyverno
          path: kyverno
        kyverno-policies:
          name: kyverno-policies
          path: kyverno-policies
        kyverno-policy-reporter:
          name: kyverno-policy-reporter
          path: kyverno-policy-reporter
        loki:
          name: loki
          path: loki
        longhorn:
          name: longhorn
          path: longhorn
        metallb:
          name: metallb
          path: metallb
        metrics-server:
          name: metrics-server
          path: metrics-server
        oauth2-proxy:
          name: oauth2-proxy
          path: oauth2-proxy
        traefik:
          name: traefik
          path: traefik
        velero:
          name: velero
          path: velero


namespace:
  labels:
    project-name: "test-cluster"
    stage: "local"
inClusterName: test-cluster
inClusterSecretLabels:
## Hub labels
  argocd: "enabled"
  cert-manager: "enabled"
  external-dns: "disabled"
  external-secrets: "enabled"
  homer-dashboard: "enabled"
  kube-prometheus-stack: "enabled"
  kyverno: "disabled"
  kyverno-policies: "disabled"
  kyverno-policy-reporter: "disabled"
  loki: "disabled"
  longhorn: "disabled"
  metallb: "disabled"
  metrics-server: "disabled"
  oauth2-proxy: "enabled"
  traefik: "enabled"
  velero: "disabled"

externalSecrets:
  secretStoreRef:
    kind: ClusterSecretStore
    name: test-cluster-local

  secretStores:
    test-cluster-local:
      kind: ClusterSecretStore
      name: test-cluster-local


  secrets:
    oauth2-credentials:
      secretStoreRef: test-cluster-local
      dataFrom:
        - remoteKey: argo_oauth2_credentials
argo-cd:
  server:
    ingressGrpc:
      enabled: true
      path: "/argocd"
      ingressClassName: traefik
      tls: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
    ingress:
      enabled: true
      path: "/argocd"
      ingressClassName: traefik
      tls: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
        traefik.ingress.kubernetes.io/router.middlewares: oauth2-proxy-oauth-auth@kubernetescrd
  configs:
    cm:
      url: https://172.18.0.2.traefik.me/argocd
      dex.config: |
        connectors:
          - type: github
            id: github
            name: GitHub
            config:
              clientID: $oauth2-credentials:client-id
              clientSecret: $oauth2-credentials:client-secret
              orgs:
                - name: local
    rbac:
      policy.default: role:readonly
      policy.csv: |
        g, local:local, role:admin
    params:
      server.rootpath: /argocd
      server.basehref: /argocd
      server.insecure: true
  global:
    domain: 172.18.0.2.traefik.me
    revisionHistoryLimit: 5
    imagePullSecrets:
      - name: image-pull-secret
  controller:
    metrics:
      enabled: true
      rules:
        enabled: false
      serviceMonitor:
        enabled: true
        additionalLabels:
          monitoring.instance: "test-cluster-local"
